name: Deploy web to Majordomo

on:
  push:
    branches: [main, master]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web-majordomo.yml"
  workflow_dispatch:

concurrency:
  group: majordomo-web-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build web
        working-directory: apps/web
        env:
          VITE_API_ORIGIN: ${{ secrets.VITE_API_ORIGIN }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload dist via SFTP mirror
        env:
          SFTP_HOST: ${{ secrets.MAJORDOMO_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.MAJORDOMO_SFTP_PORT }}
          SFTP_USER: ${{ secrets.MAJORDOMO_SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.MAJORDOMO_SFTP_PASSWORD }}
          SFTP_REMOTE_DIR: ${{ secrets.MAJORDOMO_REMOTE_DIR }}
        run: |
          test -n "$SFTP_HOST"
          test -n "$SFTP_USER"
          test -n "$SFTP_PASSWORD"
          test -n "$SFTP_REMOTE_DIR"
          if [ -z "$SFTP_PORT" ]; then SFTP_PORT=22; fi
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" "sftp://$SFTP_HOST:$SFTP_PORT" <<EOF
          set ssl:verify-certificate no
          set sftp:auto-confirm yes
          mirror -R --delete --verbose apps/web/dist "$SFTP_REMOTE_DIR"
          bye
          EOF
